<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      .grid {
        width: 100vw;
        height: 100vw;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 10px;

        grid-template-areas:
          "songlist main main"
          "info_l main main"
          "webcam info_bm info_br";
      }

      .info_l {
        grid-area: info_l;
      }
      .info_bm {
        grid-area: info_bm;
      }
      .info_br {
        grid-area: info_br;
      }

      .grid > div {
        background: lightblue;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="info_l">info_ssl</div>
      <div class="info_bm">info_bm</div>
      <div class="info_br">info_br</div>
    </div>
  </body>
</html>
